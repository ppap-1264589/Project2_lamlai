x-scraper-service: &scraper-service
  build:
    context: ./scraper
    dockerfile: dockerfile
  image: deezer_scraper:latest
  dns:
    - 8.8.8.8
    - 1.1.1.1
  environment:
    ARTIST_REQUESTS_PER_SECOND: "6.5"
    USER_REQUESTS_PER_SECOND: "3"
    GENRE_REQUESTS_PER_SECOND: "10"
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: deezer_db
    environment:
      POSTGRES_DB: deezer
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d deezer"]
      interval: 5s
      retries: 5

  scraper_artist:
    <<: *scraper-service
    container_name: deezer_scraper_artist
    command: ["python", "main.py", "artist"]

  scraper_user:
    <<: *scraper-service
    container_name: deezer_scraper_user
    command: ["python", "main.py", "user"]

  scraper_genre:
    <<: *scraper-service
    container_name: deezer_scraper_genre
    command: ["python", "main.py", "genre"]
    profiles:
      - jobs
    restart: "no"

  superset:
    build:
      context: ./superset
      dockerfile: dockerfile
    container_name: deezer_superset
    environment:
      SUPERSET_SECRET_KEY: "supersecretkey123"
    ports:
      - "8200:8088"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  superset_home:
